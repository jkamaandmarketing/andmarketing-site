<section class="page_contents">
	<div class="page_contents_inner">
		<div class="lead_box blurTrigger">
			<p>Web集客に関するご質問やご相談、協業のご相談はこちらから。<br>以下のフォームに必要事項をご入力のうえ、送信してください。担当者より折り返しご連絡いたします。</p>
		</div>
		<form class="contact_form blurTrigger" id="contactForm" novalidate>
			<input type="hidden" name="access_key" value="c24596fb-fc0b-4e6a-9423-6e01b586fdeb">
			<input type="hidden" name="subject" value="サイトからのお問い合わせ">
			<input type="hidden" name="from_name" value="アンドマーケティングHP">
			<!-- スパム対策：ハニーポット（人間には見えません） -->
			<label class="form_hp" aria-hidden="true">このフィールドは空欄のままにしてください<input type="checkbox" name="botcheck" tabindex="-1" autocomplete="off"></label>

			<div class="form_row">
				<label for="cf_company">会社名<span class="req">必須</span></label>
				<input type="text" id="cf_company" name="会社名" required autocomplete="organization">
			</div>
			<div class="form_row">
				<label for="cf_name">お名前<span class="req">必須</span></label>
				<input type="text" id="cf_name" name="お名前" required autocomplete="name">
			</div>
			<div class="form_row">
				<label for="cf_email">メールアドレス<span class="req">必須</span></label>
				<input type="email" id="cf_email" name="メールアドレス" required autocomplete="email">
			</div>
			<div class="form_row">
				<label for="cf_phone">電話番号<span class="opt">任意</span></label>
				<input type="tel" id="cf_phone" name="電話番号" autocomplete="tel">
			</div>
			<div class="form_row">
				<label for="cf_message">お問い合わせ内容<span class="req">必須</span></label>
				<textarea id="cf_message" name="お問い合わせ内容" required></textarea>
			</div>
			<div class="form_submit">
				<button type="submit">送信する</button>
			</div>
			<div class="form_msg" role="alert" aria-live="polite"></div>
		</form>
		<script>
		(function () {
			var form = document.getElementById('contactForm');
			if (!form) return;
			var btn = form.querySelector('button[type="submit"]');
			var msg = form.querySelector('.form_msg');
			var btnLabel = btn.textContent;
			form.addEventListener('submit', function (e) {
				e.preventDefault();
				if (!form.checkValidity()) { form.reportValidity(); return; }
				msg.className = 'form_msg';
				msg.textContent = '';
				btn.disabled = true;
				btn.textContent = '送信中...';
				var payload = JSON.stringify(Object.fromEntries(new FormData(form)));
				fetch('https://api.web3forms.com/submit', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
						'Accept': 'application/json'
					},
					body: payload
				})
				.then(function (res) { return res.json().then(function (json) { return { ok: res.ok, json: json }; }); })
				.then(function (r) {
					if (r.ok && r.json.success) {
						window.location.href = '/contact/thanks/';
					} else {
						throw new Error((r.json && r.json.message) || 'error');
					}
				})
				.catch(function () {
					msg.className = 'form_msg is_error';
					msg.textContent = '送信に失敗しました。お手数ですが、時間をおいて再度送信してください。何度も失敗する場合は、恐れ入りますが直接メールにてご連絡ください。';
					btn.disabled = false;
					btn.textContent = btnLabel;
				});
			});
		})();
		</script>
		<a class="back_top" href="/"><span>トップに戻る</span></a>
	</div>

<script>
$(function () {
  $('a[href*="#"]').click(function () {
    const speed = 400;
    const target = $(this.hash === '#' || '' ? 'html' : this.hash)
    if (!target.length) return;
    const targetPos = target.offset().top;
    $('html, body').animate({ scrollTop: targetPos }, speed, 'swing');
    return false;
  });
});
</script>
